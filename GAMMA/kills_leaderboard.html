    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 22px;
  }
  .summary-card {
    background: rgba(33, 43, 55, 0.8);
    border: 1px solid #2e3d50;
    border-top: 2px solid #e0a840;
    border-radius: 2px;
    padding: 10px 12px;
    text-align: center;
  }
  .summary-val {

    font-size: 1.2rem;
    font-weight: 700;
    color: #e0a840;
    font-variant-numeric: tabular-nums;

  }
  .summary-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: #8a9199; margin-top: 2px; }

  /* ── Podium ── */

    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    align-items: end;
    margin-bottom: 22px;
  }

  .podium-card {
    background: rgba(33, 43, 55, 0.8);
    border: 1px solid #2e3d50;
    border-radius: 2px;

    text-align: center;

(function render() {
  const organizer = CONTRIBUTORS.find(c => c.organizer);
  const sorted = [...CONTRIBUTORS].filter(c => !c.organizer).sort((a, b) => b.kills - a.kills);
  const totalKills = CONTRIBUTORS.reduce((s, c) => s + c.kills, 0); // includes organizer in total
  const top = sorted[0];
  const TABLE_ROWS = 10;

  document.getElementById('total-contributors').textContent = CONTRIBUTORS.length;
  document.getElementById('total-kills').textContent = totalKills.toLocaleString();
  document.getElementById('top-contributor').textContent = top ? top.name : '—';

  const totalEntries = sorted.length;
  function barColor(rankIndex) {
    const t = totalEntries > 1 ? 1 - (rankIndex / (totalEntries - 1)) : 1;
    // Amber (#e0a840) → muted blue-grey (#4d6680)
    const r = Math.round(224 * t + 77  * (1 - t));
    const g = Math.round(168 * t + 102 * (1 - t));
    const b = Math.round(64  * t + 128 * (1 - t));
    const toHex = n => n.toString(16).padStart(2, '0');
    return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
  }

  const medals  = ['🥇','🥈','🥉'];
  const ranks   = ['rank-1','rank-2','rank-3'];
  const podiumOrder = [1, 0, 2];
  const podiumEl = document.getElementById('podium');
  podiumEl.innerHTML = podiumOrder.map(i => {
    const entry = sorted[i];
    const rankNum = i + 1;
    if (entry) {
      const starBadge = entry.isNew ? ' <span class="new-star">★</span>' : '';
      return `
        <div class="podium-card ${ranks[i]}">
          <span class="podium-medal">${medals[i]}</span>
          <div class="podium-rank">#${rankNum}</div>
          <div class="podium-name">${entry.name}${starBadge}</div>
          <span class="podium-kills">${entry.kills.toLocaleString()}</span>
          <div class="podium-kills-label">kills</div>
        </div>`;
    } else {
      return `
        <div class="podium-card ${ranks[i]}">
          <span class="podium-medal">${medals[i]}</span>
          <div class="podium-rank">#${rankNum}</div>
          <div class="podium-name blank">open slot</div>
          <span class="podium-kills blank">—</span>
          <div class="podium-kills-label">kills</div>
        </div>`;
    }
  }).join('');

  const maxKills = Math.max(top ? top.kills : 0, organizer ? organizer.kills : 0);
  const sqrtMax = Math.sqrt(maxKills);
  const tbody = document.getElementById('lb-tbody');
  const rows = Math.max(sorted.length, TABLE_ROWS);
  tbody.innerHTML = Array.from({ length: rows }, (_, i) => {
    const entry = sorted[i];
    if (entry) {
      const pct = ((Math.sqrt(entry.kills) / sqrtMax) * 100).toFixed(2);
      const col = barColor(i); // i is rank index

      // Build social links
      let socials = '';
      if (entry.youtube || entry.twitch) {
        socials += '<span class="social-links">';
        if (entry.youtube) {
          socials += `<a href="${entry.youtube}" target="_blank" rel="noopener noreferrer" class="social-icon yt" title="YouTube Channel">
                        <svg viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>
                      </a>`;
        }
        if (entry.twitch) {
          socials += `<a href="${entry.twitch}" target="_blank" rel="noopener noreferrer" class="social-icon tw" title="Twitch Channel">
                        <svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
                      </a>`;
        }
        socials += '</span>';
      }

      const starBadge = entry.isNew ? ' <span class="new-star">★</span>' : '';
      const deltaBadge = entry.newKills ? `<span class="kills-delta">(+${entry.newKills.toLocaleString()})</span>` : '';

      return `
        <tr>
          <td class="lb-rank-num">${i + 1}</td>
          <td class="lb-name">
            ${entry.name}${starBadge}
            ${socials}
          </td>
          <td class="lb-bar-cell">
            <div class="lb-bar-track">
              <div class="lb-bar-fill" style="width:${pct}%; background:${col};"></div>
            </div>
          </td>
          <td class="lb-kills" style="color:${col};"><span style="display:flex;align-items:baseline;justify-content:flex-end;gap:5px;">${deltaBadge}${entry.kills.toLocaleString()}</span></td>
        </tr>`;
    } else {
      return `
        <tr>
          <td class="lb-rank-num" style="color:#4b5563;">${i + 1}</td>
          <td style="color:#4b5563; font-style:italic;">—</td>
          <td class="lb-bar-cell">
            <div class="lb-bar-track"><div class="lb-bar-fill" style="width:0%"></div></div>
          </td>
          <td class="lb-kills" style="color:#374151;">—</td>
        </tr>`;
    }
  }).join('');
  // ── Organizer row (pinned to bottom, grayed out) ──
  if (organizer) {
    const orgPct = ((Math.sqrt(organizer.kills) / sqrtMax) * 100).toFixed(2);
    tbody.innerHTML += `
      <tr>
        <td class="lb-rank-num" style="color:#4b5563;">—</td>
        <td class="lb-name" style="color:#6b7280;">
          ${organizer.name}
        </td>
        <td class="lb-bar-cell">
          <div class="lb-bar-track">
            <div class="lb-bar-fill" style="width:${orgPct}%; background:#4b5563;"></div>
          </div>
        </td>
        <td class="lb-kills" style="color:#4b5563;">${organizer.kills.toLocaleString()}</td>
      </tr>`;
  }
})();
</script>
</body>
</html>
