  }

  a { color: #4d8fc9; text-decoration: none; transition: color 0.2s; }

  .container { max-width: 960px; margin: 0 auto; }

  /* ── Site header ── */
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 12px; flex-wrap: wrap; }
  .site-title { font-size: 0.95rem; font-weight: 700; color: #e6edf3; cursor: pointer; transition: color 0.2s; letter-spacing: 0.03em; }
  .site-title:hover { color: #e0a840; }

  /* ── Breadcrumb ── */
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 18px; color: #767b82; }
  .breadcrumb a { color: #4d8fc9; }
  .breadcrumb-sep { color: #64686e; }

  /* ── Hero / page title ── */
  .hero { padding: 10px 0 18px; }
  .page-title { font-size: 1.2rem; font-weight: 700; color: #e0a840; margin-bottom: 5px; letter-spacing: 0.02em; }
  .page-subtitle { color: #b0b8c4; font-size: 0.78rem; }

  /* ── Section label ── */
  .section-label { font-size: 0.69rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #e6edf3; border-left: 2px solid #e0a840; padding-left: 8px; margin-bottom: 10px; }
  .section-divider { border: none; border-top: 1px solid #2e3d50; margin: 22px 0; }

  /* ── Summary strip ── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 22px;
  }
  .summary-card {
    background: rgba(33, 43, 55, 0.8);
    border: 1px solid #2e3d50;
    border-top: 2px solid #e0a840;
    border-radius: 2px;
    padding: 10px 12px;
    text-align: center;
  }
  .summary-val {
    display: block;
    font-size: 1.2rem;
    font-weight: 700;
    color: #e0a840;
    font-variant-numeric: tabular-nums;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
  }
  .summary-lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: #8a9199; margin-top: 2px; }

  /* ── Podium ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    align-items: end;
    margin-bottom: 22px;
  }

  .podium-card {
    background: rgba(33, 43, 55, 0.8);
    border: 1px solid #2e3d50;
    border-radius: 2px;
    padding: 14px 12px 12px;
    text-align: center;
    position: relative;
    transition: border-color 0.2s;
  }

  .podium-card.rank-1 {
    border-color: #e0a840;
    background: rgba(224, 168, 64, 0.08);
    padding-top: 20px;
  }
  .podium-card.rank-2 { border-color: #4d6680; }
  .podium-card.rank-3 { border-color: #4a3820; }

  .podium-medal { font-size: 1.4rem; display: block; margin-bottom: 5px; }

  .podium-rank {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .rank-1 .podium-rank { color: #e0a840; }
  .rank-2 .podium-rank { color: #8a9199; }
  .rank-3 .podium-rank { color: #9a7030; }

  .podium-name {
    font-size: 0.98rem;
    font-weight: 700;
    color: #e6edf3;
    margin-bottom: 4px;
    min-height: 1.1rem;
  }
  .podium-name.blank { color: #2a3545; font-style: italic; font-weight: 400; font-size: 0.8rem; }

  .podium-kills {
    font-size: 1.15rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
    display: block;
    margin-bottom: 2px;
  }
  .rank-1 .podium-kills { color: #e0a840; }
  .rank-2 .podium-kills { color: #8a9199; }
  .rank-3 .podium-kills { color: #a87838; }
  .podium-kills.blank { color: #2a3545; font-size: 0.875rem; font-weight: 400; font-style: italic; }

  .podium-kills-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6a7480; }

  /* ── Leaderboard table ── */
  .lb-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  .lb-table th {
    background: rgba(33, 43, 55, 0.9);
    color: #8a9199;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 10px;
    text-align: left;
    border-bottom: 1px solid #2e3d50;
    font-weight: 700;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .lb-table th.right { text-align: right; }

  .lb-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #1e2d3d;
    vertical-align: middle;
    color: #b0b8c4;
  }

  .lb-table tr:hover td { background: rgba(224, 168, 64, 0.04); }

  .lb-rank-num {
    font-size: 0.7rem;
    font-weight: 700;
    color: #4d6680;
    font-variant-numeric: tabular-nums;
    font-family: 'IBM Plex Mono', monospace;
    width: 36px;
  }

  .lb-name {
    color: #d8e0e8;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Social Links ── */
  .social-links { display: inline-flex; align-items: center; gap: 6px; }
  .social-icon { color: #4d6680; display: inline-flex; transition: color 0.2s, transform 0.2s; }
  .social-icon:hover { transform: scale(1.1); }
  .social-icon.yt:hover { color: #ef4444; }
  .social-icon.tw:hover { color: #a855f7; }
  .social-icon svg { width: 14px; height: 14px; fill: currentColor; }

  .lb-kills {
    text-align: right;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
  }

  .lb-bar-cell { width: 180px; padding-right: 14px; }

  .lb-bar-track {
    background: #1e2d3d;
    border-radius: 1px;
    height: 4px;
    overflow: hidden;
  }

  .lb-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  /* ── New-contributor star ── */
  .new-star {
    display: inline-flex;
    align-items: center;
    cursor: default;
    font-size: 0.75rem;
    color: #e0a840;
    position: relative;
    line-height: 1;
  }
  .new-star::after {
    content: 'New contributor!';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2d3d;
    color: #e6edf3;
    border: 1px solid #2e3d50;
    border-radius: 2px;
    padding: 3px 10px;
    font-size: 0.65rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
    font-family: 'IBM Plex Sans', sans-serif;
    letter-spacing: 0.04em;
  }
  .new-star:hover::after { opacity: 1; }

  .kills-delta {
    font-size: 0.68rem;
    font-weight: 700;
    color: #5cb870;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
    margin-left: 4px;

    font-size: 0.72rem;
    font-weight: 700;
    color: #5cb870;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
    display: block;
    margin-top: 2px;

  .lb-search {
    background: #0d1a26;
    border: 1px solid #2e3d50;
    border-radius: 2px;
    color: #d7dde3;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    padding: 3px 7px;
    outline: none;
    width: 120px;
    transition: border-color 0.2s;
    vertical-align: middle;
  }
  .lb-search::placeholder { color: #4d6680; }
  .lb-search:focus { border-color: #e0a840; }


  @media (max-width: 600px) {
    .podium { grid-template-columns: 1fr; align-items: start; }
    .summary-strip { grid-template-columns: 1fr 1fr; }
    .lb-bar-cell { display: none; }
  }
</style>

(function render() {
  const organizer = CONTRIBUTORS.find(c => c.organizer);
  const sorted = [...CONTRIBUTORS].filter(c => !c.organizer).sort((a, b) => b.kills - a.kills);
  const totalKills = CONTRIBUTORS.reduce((s, c) => s + c.kills, 0); // includes organizer in total
  const top = sorted[0];
  const TABLE_ROWS = 10;

  document.getElementById('total-contributors').textContent = CONTRIBUTORS.length;
  document.getElementById('total-kills').textContent = totalKills.toLocaleString();
  document.getElementById('top-contributor').textContent = top ? top.name : '—';

  const totalEntries = sorted.length;
  function barColor(rankIndex) {
    const t = totalEntries > 1 ? 1 - (rankIndex / (totalEntries - 1)) : 1;
    // Amber (#e0a840) → muted blue-grey (#4d6680)
    const r = Math.round(224 * t + 77  * (1 - t));
    const g = Math.round(168 * t + 102 * (1 - t));
    const b = Math.round(64  * t + 128 * (1 - t));
    const toHex = n => n.toString(16).padStart(2, '0');
    return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
  }

  const medals  = ['🥇','🥈','🥉'];
  const ranks   = ['rank-1','rank-2','rank-3'];
  const podiumOrder = [1, 0, 2];
  const podiumEl = document.getElementById('podium');
  podiumEl.innerHTML = podiumOrder.map(i => {
    const entry = sorted[i];
    const rankNum = i + 1;
    if (entry) {
      const starBadge = entry.isNew ? ' <span class="new-star">★</span>' : '';
      return `
        <div class="podium-card ${ranks[i]}">
          <span class="podium-medal">${medals[i]}</span>
          <div class="podium-rank">#${rankNum}</div>
          <div class="podium-name">${entry.name}${starBadge}</div>
          <span class="podium-kills">${entry.kills.toLocaleString()}</span>
          <div class="podium-kills-label">kills</div>
        </div>`;
    } else {
      return `
        <div class="podium-card ${ranks[i]}">
          <span class="podium-medal">${medals[i]}</span>
          <div class="podium-rank">#${rankNum}</div>
          <div class="podium-name blank">open slot</div>
          <span class="podium-kills blank">—</span>
          <div class="podium-kills-label">kills</div>
        </div>`;
    }
  }).join('');

  const maxKills = Math.max(top ? top.kills : 0, organizer ? organizer.kills : 0);
  const sqrtMax = Math.sqrt(maxKills);
  const tbody = document.getElementById('lb-tbody');
  const rows = Math.max(sorted.length, TABLE_ROWS);
  tbody.innerHTML = Array.from({ length: rows }, (_, i) => {
    const entry = sorted[i];
    if (entry) {
      const pct = ((Math.sqrt(entry.kills) / sqrtMax) * 100).toFixed(2);
      const col = barColor(i); // i is rank index

      // Build social links
      let socials = '';
      if (entry.youtube || entry.twitch) {
        socials += '<span class="social-links">';
        if (entry.youtube) {
          socials += `<a href="${entry.youtube}" target="_blank" rel="noopener noreferrer" class="social-icon yt" title="YouTube Channel">
                        <svg viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>
                      </a>`;
        }
        if (entry.twitch) {
          socials += `<a href="${entry.twitch}" target="_blank" rel="noopener noreferrer" class="social-icon tw" title="Twitch Channel">
                        <svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
                      </a>`;
        }
        socials += '</span>';
      }

      const starBadge = entry.isNew ? ' <span class="new-star">★</span>' : '';
      const deltaBadge = entry.newKills ? `<span class="kills-delta">(+${entry.newKills.toLocaleString()})</span>` : '';

      return `
        <tr>
          <td class="lb-rank-num">${i + 1}</td>
          <td class="lb-name">
            ${entry.name}${starBadge}
            ${socials}
          </td>
          <td class="lb-bar-cell">
            <div class="lb-bar-track">
              <div class="lb-bar-fill" style="width:${pct}%; background:${col};"></div>
            </div>
          </td>
          <td class="lb-kills" style="color:${col};"><span style="display:flex;align-items:baseline;justify-content:flex-end;gap:5px;">${deltaBadge}${entry.kills.toLocaleString()}</span></td>
        </tr>`;
    } else {
      return `
        <tr>
          <td class="lb-rank-num" style="color:#4b5563;">${i + 1}</td>
          <td style="color:#4b5563; font-style:italic;">—</td>
          <td class="lb-bar-cell">
            <div class="lb-bar-track"><div class="lb-bar-fill" style="width:0%"></div></div>
          </td>
          <td class="lb-kills" style="color:#374151;">—</td>
        </tr>`;
    }
  }).join('');
  // ── Organizer row (pinned to bottom, grayed out) ──
  if (organizer) {
    const orgPct = ((Math.sqrt(organizer.kills) / sqrtMax) * 100).toFixed(2);
    tbody.innerHTML += `
      <tr>
        <td class="lb-rank-num" style="color:#4b5563;">—</td>
        <td class="lb-name" style="color:#6b7280;">
          ${organizer.name}
        </td>
        <td class="lb-bar-cell">
          <div class="lb-bar-track">
            <div class="lb-bar-fill" style="width:${orgPct}%; background:#4b5563;"></div>
          </div>
        </td>
        <td class="lb-kills" style="color:#4b5563;">${organizer.kills.toLocaleString()}</td>
      </tr>`;
  }
})();

function filterTable(query) {
  const q = query.trim().toLowerCase();
  const rows = document.querySelectorAll('#lb-tbody tr');
  let firstMatch = null;
  rows.forEach(row => {
    const nameCell = row.querySelector('.lb-name');
    if (!nameCell) { row.style.display = q ? 'none' : ''; return; }
    const name = nameCell.textContent.trim().toLowerCase();
    const match = !q || name.includes(q);
    row.style.display = match ? '' : 'none';

    if (match && q && !firstMatch) firstMatch = row;
  });
  if (firstMatch) firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
